---
# Verify every expected eBGP peer is present AND Established.
# Fails if BGP is disabled / zero peers, or any peer not Established.
- name: Verify eBGP sessions
  hosts: spine:leaf
  gather_facts: false
  tasks:
    - name: Collect BGP summary (JSON)
      arista.eos.eos_command:
        commands: ["show ip bgp summary | json"]
      register: bgpsum

    - name: Assert all fabric peers Established
      vars:
        peers: "{{ bgpsum.stdout[0].vrfs.default.peers | default({}) }}"
        expected: "{{ p2p_links | length }}"
        established: "{{ peers | dict2items | selectattr('value.peerState','equalto','Established') | list | length }}"
        down: "{{ peers | dict2items | rejectattr('value.peerState','equalto','Established') | map(attribute='key') | list }}"
      ansible.builtin.assert:
        that:
          - "peers | length | int == expected | int"
          - "established | int == expected | int"
        success_msg: "{{ inventory_hostname }}: all {{ expected }} eBGP peers Established"
        fail_msg: "{{ inventory_hostname }}: {{ peers | length }}/{{ expected }} peers, {{ established }} Established; down/missing -> {{ down }}"
