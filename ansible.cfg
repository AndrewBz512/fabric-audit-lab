# PNetLab playbooks — project-level Ansible config.
# Runs from /opt/pnetlab-playbooks on devbox-104 (192.168.1.104), which has the
# static route 172.100.1.0/24 via 192.168.1.11 into the PNetLab mgmt net.
[defaults]
inventory = ./inventory/pnetlab.yml
host_key_checking = False
retry_files_enabled = False
stdout_callback = default
result_format = yaml
gathering = explicit
forks = 10
timeout = 30
collections_path = ./collections:~/.ansible/collections

[persistent_connection]
# Virtual IOS/NX-OS nodes on PNetLab are slow to answer; be generous.
connect_timeout = 60
command_timeout = 120

[paramiko_connection]
host_key_checking = False
look_for_keys = False
