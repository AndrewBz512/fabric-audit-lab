name: fabric-audit-srl
prefix: clab

mgmt:
  network: mgmt-net
  ipv4-subnet: 172.20.21.0/24

topology:
  kinds:
    nokia_srlinux:
      image: ghcr.io/nokia/srlinux:latest
  nodes:
    spine1: { kind: nokia_srlinux, mgmt-ipv4: 172.20.21.11 }
    spine2: { kind: nokia_srlinux, mgmt-ipv4: 172.20.21.12 }
    leaf1:  { kind: nokia_srlinux, mgmt-ipv4: 172.20.21.21 }
    leaf2:  { kind: nokia_srlinux, mgmt-ipv4: 172.20.21.22 }
  links:
    - endpoints: ["spine1:e1-1", "leaf1:e1-1"]
    - endpoints: ["spine1:e1-2", "leaf2:e1-1"]
    - endpoints: ["spine2:e1-1", "leaf1:e1-2"]
    - endpoints: ["spine2:e1-2", "leaf2:e1-2"]
