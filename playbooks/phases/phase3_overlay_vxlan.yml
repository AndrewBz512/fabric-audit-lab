# Phase 3 — Spine/Leaf overlay (NX-OS): BGP EVPN control plane, NVE, VNI maps.
# Spines act as iBGP route reflectors; leaves are VTEPs with ingress-replication.
#
# GAP NOTE: cisco.nxos EVPN support needs NX-OSv 9.2+. A feature pre-flight
# runs first so an unsupported image fails loudly here instead of silently
# mid-phase (see risk register). Pin the collection via requirements.yml.
---
- name: "Phase 3 — VXLAN/EVPN overlay (NX-OS spine/leaf)"
  hosts: spine_leaf
  gather_facts: false
  tags: [phase3]

  vars:
    # Spines peer with every leaf; leaves peer with every spine.
    evpn_peers: "{{ groups['leaf'] if inventory_hostname in groups['spine'] else groups['spine'] }}"

  tasks:
    - name: Phase 3 configuration
      block:
        # ---- pre-flight: image must support the features we need ----
        - name: Enable required NX-OS features
          cisco.nxos.nxos_feature:
            feature: "{{ item }}"
            state: enabled
          loop: "{{ nxos_required_features }}"

        - name: Enable OSPF feature + EVPN overlay control plane
          cisco.nxos.nxos_config:
            lines:
              - feature ospf
              - nv overlay evpn

        - name: Configure Loopback0 (BGP RID + VTEP source)
          cisco.nxos.nxos_config:
            lines:
              - "ip address {{ vtep_loopbacks[inventory_hostname] }}/32"
              - ip router ospf UNDERLAY area 0.0.0.0
            parents: interface loopback0

        - name: OSPF underlay process
          cisco.nxos.nxos_config:
            lines:
              - "router-id {{ vtep_loopbacks[inventory_hostname] }}"
            parents: router ospf UNDERLAY

        - name: OSPF on fabric point-to-point links
          cisco.nxos.nxos_config:
            lines:
              - no switchport
              - ip router ospf UNDERLAY area 0.0.0.0
              - no shutdown
            parents: "interface {{ item }}"
          loop:
            - Ethernet1/1
            - Ethernet1/2

        # ---- BGP EVPN control plane ----
        - name: BGP process with router-id
          cisco.nxos.nxos_config:
            lines:
              - "router-id {{ vtep_loopbacks[inventory_hostname] }}"
            parents: "router bgp {{ bgp_asn }}"

        - name: EVPN neighbors (loopback-sourced iBGP)
          cisco.nxos.nxos_config:
            lines:
              - "remote-as {{ bgp_asn }}"
              - update-source loopback0
            parents:
              - "router bgp {{ bgp_asn }}"
              - "neighbor {{ vtep_loopbacks[item] }}"
          loop: "{{ evpn_peers }}"

        - name: Activate l2vpn evpn AF per neighbor
          cisco.nxos.nxos_config:
            lines:
              - send-community extended
            parents:
              - "router bgp {{ bgp_asn }}"
              - "neighbor {{ vtep_loopbacks[item] }}"
              - address-family l2vpn evpn
          loop: "{{ evpn_peers }}"

        - name: Route-reflector-client for leaf neighbors (spines only)
          cisco.nxos.nxos_config:
            lines:
              - route-reflector-client
            parents:
              - "router bgp {{ bgp_asn }}"
              - "neighbor {{ vtep_loopbacks[item] }}"
              - address-family l2vpn evpn
          loop: "{{ evpn_peers }}"
          when: inventory_hostname in groups['spine']

        # ---- leaf-only: VNIs, tenant VRF, NVE ----
        - name: Map L2 VLANs to VNIs (leaves)
          cisco.nxos.nxos_config:
            lines:
              - "vn-segment {{ item.vni }}"
            parents: "vlan {{ item.vlan }}"
          loop: "{{ l2_vnis }}"
          when: inventory_hostname in groups['leaf']

        - name: L3 VNI VLAN (leaves)
          cisco.nxos.nxos_config:
            lines:
              - "vn-segment {{ l3_vni.vni }}"
            parents: "vlan {{ l3_vni.vlan }}"
          when: inventory_hostname in groups['leaf']

        - name: Tenant VRF with L3 VNI (leaves)
          cisco.nxos.nxos_config:
            lines:
              - "vni {{ l3_vni.vni }}"
              - rd auto
            parents: "vrf context {{ l3_vni.vrf }}"
          when: inventory_hostname in groups['leaf']

        - name: Tenant VRF route-targets (leaves)
          cisco.nxos.nxos_config:
            lines:
              - route-target both auto
              - route-target both auto evpn
            parents:
              - "vrf context {{ l3_vni.vrf }}"
              - address-family ipv4 unicast
          when: inventory_hostname in groups['leaf']

        - name: NVE1 interface (leaves)
          cisco.nxos.nxos_config:
            lines:
              - no shutdown
              - host-reachability protocol bgp
              - source-interface loopback0
            parents: interface nve1
          when: inventory_hostname in groups['leaf']

        - name: NVE member L2 VNIs with BGP ingress-replication (leaves)
          cisco.nxos.nxos_config:
            lines:
              - ingress-replication protocol bgp
            parents:
              - interface nve1
              - "member vni {{ item.vni }}"
          loop: "{{ l2_vnis }}"
          when: inventory_hostname in groups['leaf']

        - name: NVE L3 VNI associate-vrf (leaves)
          cisco.nxos.nxos_config:
            lines:
              - "member vni {{ l3_vni.vni }} associate-vrf"
            parents: interface nve1
          when: inventory_hostname in groups['leaf']

        - name: EVPN L2 instances (leaves)
          cisco.nxos.nxos_config:
            lines:
              - rd auto
              - route-target import auto
              - route-target export auto
            parents:
              - evpn
              - "vni {{ item.vni }} l2"
          loop: "{{ l2_vnis }}"
          when: inventory_hostname in groups['leaf']

        # ---- verify ----
        - name: Wait for EVPN sessions to establish
          cisco.nxos.nxos_command:
            commands:
              - show bgp l2vpn evpn summary
            wait_for:
              - result[0] contains Established
            retries: 12
            interval: 10

        - name: Collect NVE VNI state on leaves
          cisco.nxos.nxos_command:
            commands:
              - show nve vni
          register: nve_out
          when: inventory_hostname in groups['leaf']

        - name: Assert every L2 VNI is present on leaves
          ansible.builtin.assert:
            that:
              - nve_out.stdout[0] is search(item.vni | string)
            fail_msg: "VNI {{ item.vni }} missing on {{ inventory_hostname }}"
            quiet: true
          loop: "{{ l2_vnis }}"
          when: inventory_hostname in groups['leaf']

        - name: Save running-config
          cisco.nxos.nxos_config:
            save_when: modified

        - name: Report success to N8N
          ansible.builtin.include_tasks: ../tasks/notify_n8n.yml
          vars:
            phase_id: phase3
            phase_status: success
            phase_detail: "EVPN Established; VNIs {{ l2_vnis | map(attribute='vni') | join('/') }} + L3VNI {{ l3_vni.vni }} up"

      rescue:
        - name: Report failure to N8N
          ansible.builtin.include_tasks: ../tasks/notify_n8n.yml
          vars:
            phase_id: phase3
            phase_status: failed
            phase_detail: "{{ ansible_failed_task.name | default('unknown task') }} failed on {{ inventory_hostname }}"

        - name: Fail the phase (gate for site.yml)
          ansible.builtin.fail:
            msg: "Phase 3 failed — see task output above."
